<div class="dashboard">
  <h1>Dashboard</h1>

  <div class="kpi-grid">
    @if (store.loading()) {
      @for (_ of [1,2,3,4]; track _) {
        <p-skeleton height="100px" />
      }
    } @else {
      <app-kpi-card icon="pi-box" [value]="store.totalProducts()" label="Total Productos" color="#6366f1" />
      <app-kpi-card icon="pi-exclamation-triangle" [value]="store.totalAlerts()" label="Alertas Activas" color="#6366f1" />
      <app-kpi-card icon="pi-times-circle" [value]="store.criticalAlerts()" label="Alertas Críticas" color="#6366f1" />
      <app-kpi-card icon="pi-dollar" [value]="'$' + (store.totalInventoryValue() | number:'1.2-2')" label="Valor Inventario" color="#6366f1" />
    }
  </div>

  <div class="content-grid">
    <p-panel header="Alertas de Stock" [toggleable]="true" styleClass="alerts-panel">
      @if (store.alerts().length === 0) {
        <p>No hay alertas activas.</p>
      }

      @for (alert of store.alerts(); track alert.productId) {
        <div class="alert-item" [class.critical]="alert.severity === 'CRITICAL'">
          <i [class]="'pi ' + (alert.severity === 'CRITICAL' ? 'pi-times-circle' : 'pi-exclamation-triangle')"
             [style.color]="alert.severity === 'CRITICAL' ? 'var(--red-500)' : 'var(--orange-500)'"></i>
          <span class="alert-sku">{{ alert.sku }}</span>
          <span class="alert-name">{{ alert.productName }}</span>
          <span class="col-stock">
            <span>{{ alert.currentStock }} / {{ alert.minStock }}</span>
          </span>
          <p-tag [severity]="alert.severity === 'CRITICAL' ? 'danger' : 'warn'"
                 [value]="alert.severity" />
        </div>
      }
    </p-panel>

    <p-panel header="Registrar Movimiento" class="movement-panel">
      <form [formGroup]="form" (ngSubmit)="submit()" class="movement-form">
        <div class="field">
          <label>Producto</label>
          <p-select formControlName="product" [options]="allProducts()" optionLabel="name"
                    [filter]="true" filterBy="name" placeholder="Buscar producto..."
                    styleClass="w-full" />
        </div>
        <div class="field">
          <label>Tipo</label>
          <p-selectButton [options]="movementTypes" formControlName="type"
                          optionLabel="label" optionValue="value" />
        </div>
        <div class="field">
          <label>Cantidad</label>
          <p-inputNumber formControlName="quantity" [min]="1" styleClass="w-full" />
        </div>
        <div class="field">
          <label>Razón</label>
          <textarea pTextarea formControlName="reason" rows="2" class="w-full"></textarea>
        </div>
        <p-button type="submit" label="Guardar Movimiento" icon="pi pi-save"
                  [disabled]="form.invalid || saving()" [loading]="saving()" styleClass="w-full" />
      </form>
    </p-panel>
  </div>
</div>
